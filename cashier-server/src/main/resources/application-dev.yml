spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cashier_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
    packages:
      trust-all: true

logging:
  level:
    com.cashier.server: debug
    org.springframework.web: info

erp:
  api:
    base-url: http://erp.example.com/api
    app-key: your_app_key
    app-secret: your_app_secret
    timeout: 30000
    retry-times: 3
    retry-interval: 5000

tax:
  control:
    base-url: http://tax-control.example.com/api
    app-key: your_tax_app_key
    app-secret: your_tax_app_secret
    seller-tax-no: 91110000000000000X
    seller-name: 示例餐饮管理有限公司
    seller-address: 北京市朝阳区xx路xx号
    seller-bank: 中国工商银行xx支行
    seller-phone: 010-12345678
    timeout: 30000
    retry-times: 3
    retry-interval: 5000
    default-tax-rate: 0.01
