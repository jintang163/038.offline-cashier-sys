spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://prod-db:3306/cashier_db?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-wait: -1ms
        max-idle: 16
        min-idle: 4
  activemq:
    broker-url: ${MQ_BROKER_URL:tcp://localhost:61616}
    user: ${MQ_USER:admin}
    password: ${MQ_PASSWORD:admin}
    packages:
      trust-all: true

logging:
  level:
    com.cashier.server: info
    org.springframework.web: warn

erp:
  api:
    base-url: ${ERP_BASE_URL:http://erp.example.com/api}
    app-key: ${ERP_APP_KEY:your_app_key}
    app-secret: ${ERP_APP_SECRET:your_app_secret}
    timeout: ${ERP_TIMEOUT:30000}
    retry-times: ${ERP_RETRY_TIMES:3}
    retry-interval: ${ERP_RETRY_INTERVAL:5000}

tax:
  control:
    base-url: ${TAX_CONTROL_BASE_URL:http://tax-control.example.com/api}
    app-key: ${TAX_CONTROL_APP_KEY:your_tax_app_key}
    app-secret: ${TAX_CONTROL_APP_SECRET:your_tax_app_secret}
    seller-tax-no: ${TAX_CONTROL_SELLER_TAX_NO:91110000000000000X}
    seller-name: ${TAX_CONTROL_SELLER_NAME:}
    seller-address: ${TAX_CONTROL_SELLER_ADDRESS:}
    seller-bank: ${TAX_CONTROL_SELLER_BANK:}
    seller-phone: ${TAX_CONTROL_SELLER_PHONE:}
    timeout: ${TAX_CONTROL_TIMEOUT:30000}
    retry-times: ${TAX_CONTROL_RETRY_TIMES:3}
    retry-interval: ${TAX_CONTROL_RETRY_INTERVAL:5000}
    default-tax-rate: ${TAX_CONTROL_DEFAULT_TAX_RATE:0.01}
